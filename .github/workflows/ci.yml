name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: streetroller_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/streetroller_test
      OPENAI_API_KEY: sk-test-fake-key
      WHATSAPP_TOKEN: fake-token
      WHATSAPP_PHONE_NUMBER_ID: "123456"
      WHATSAPP_VERIFY_TOKEN: test-verify
      PGSSLMODE: disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t streetroller-agent:ci .

      - name: Verify image runs
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql://test:test@host/db \
            -e OPENAI_API_KEY=sk-test \
            -e WHATSAPP_TOKEN=tok \
            -e WHATSAPP_PHONE_NUMBER_ID=1 \
            -e WHATSAPP_VERIFY_TOKEN=v \
            -e OPENAI_ENABLED=false \
            --entrypoint node \
            streetroller-agent:ci \
            -e "console.log('OK')"
